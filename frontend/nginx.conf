# ============================================
# Nginx — Frontend static + Reverse Proxy
#
# Раздаёт React SPA и проксирует API/WebSocket
# в api-gateway. Единая точка входа на :80.
# ============================================

server {
    listen 80;
    server_name localhost;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ========================================
    # API Gateway — REST endpoints
    # ========================================
    location /api/ {
        proxy_pass http://api-gateway:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts для длинных запросов
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========================================
    # WebSocket — real-time push
    # ========================================
    location /ws {
        proxy_pass http://api-gateway:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WS timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ========================================
    # Health — API gateway health check
    # ========================================
    location /health {
        proxy_pass http://api-gateway:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========================================
    # Metrics — Prometheus
    # ========================================
    location /metrics {
        proxy_pass http://api-gateway:8000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Ограничиваем доступ к метрикам (опционально)
        # allow 127.0.0.1;
        # deny all;
    }

    # ========================================
    # Static files — React SPA
    # ========================================
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # SPA routing — все пути → index.html
        try_files $uri $uri/ /index.html;

        # Cache static assets (имеют hash в имени)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
